<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
            color: white;
        }

        .container-body {
            margin: 50px auto;
            padding: 1.5rem;
            width: 300px;
            height: 320px;
            background-color: rgb(0, 59, 70);
            display: flex; 
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            clear: both;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        p {
            font-size: 1.5rem;
            line-height: 1.1;
        }

        .top-bar {
            width: 100%;
            height: 12%;
            display: flex;
            justify-content: center;
        }

        .box {
            width: 100%;
            background-color: gray;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
        }

        .box-checked {
            background-color: rgb(0, 199, 156);
        }

        form{
            width: 100%;
            height: 50%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        input{
            width: 100%;
            height: 20%;
            background-color: rgb(0, 59, 70);
        }

        button{
            width: 100%;
            height: 40%;
            background-color: rgb(0, 199, 156);
            font-size: 1.5rem;
        }

        a{
            text-decoration-line: none;
        }
    </style>
</head>
<body>
    <div class="container-body">
        <div class="container">
            <div class="top-bar">
                <a href="./답안지2-2.html" class="box box-unchecked">Sign Up</a>
                <div class="box box-checked">Log In</div>
            </div>

            <p>Welcom Back!</p>

            <form action="">
                <input type="text" placeholder="Email Adress *">
                <input type="text" placeholder="Password *">

                <button type="button">LOG IN</button>
            </form>
        </div>
</body>
</html>
