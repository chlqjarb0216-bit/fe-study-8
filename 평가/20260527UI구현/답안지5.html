<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        .container {
            width: 100%;
        }

        .box{
            width: 100%;
            height: 100px;
            margin: 10px;
            background-color: skyblue;
        }

        @media screen and (min-width: 400px) {
            .container {
                width: 100%;
                margin: 0 auto;
            }
        }

        @media screen and (min-width: 800px) {
            .container {
                width: 100%;
                margin: 0 auto;
                display: flex;
                flex-wrap: wrap;
            }

            .box{
                width: 45%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">CSS</div>
        <div class="box">HTML</div>
        <div class="box">자바스크립트</div>
    </div>
</body>
</html>
