<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- audio video 미디어 표시 -->

    <audio src="../../media/5second.mp3" controls></audio>

    <audio controls>
        <source src="../../media/5second.mp3" type="audio/mpeg">
        <source src="../../media/5second.ogg" type="audio/ogg">
        <source src="../../media/5second.wav" type="audio/wav">
        <!-- 지원하지 않는 경우 표시할 내용 -->
        브라우저가 audio 요소를 지원하지 않습니다.
    </audio>

    <video src="../../media/5second.mp4" controls></video>

    <video controls>
        <source src="../../media/5second.mp4" type="video/mp4">
        <source src="../../media/5second.webm" type="video/webm">
        <source src="../../media/5second.avi" type="video/x-msvideo">
        <!-- 지원하지 않는 경우 표시할 내용 -->
        브라우저가 video 요소를 지원하지 않습니다.
    </video>

    <!-- muted가 되어있지 않으면 자동 재생되지 않음(Chrome의 경우) -->
    <video src="../../media/5second.mp4" autoplay muted loop></video>

    <!-- iframe은 다른 웹사이트의 콘텐츠를 삽입할 때 사용 -->
    <!-- 태그[속성 속성]으로 간편하게 작성 -->
    <!-- iframe[width height] -->
    <iframe width="815" height="458" src="https://www.youtube.com/embed/v0YEaeIClKY" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

</body>
</html>
