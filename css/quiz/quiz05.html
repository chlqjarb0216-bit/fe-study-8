        }

        .container {
            width: 500px;
            margin:0 auto;

        /* float */
        .red-box {
            width:50%;
            height:100px;
            background-color: red;
            float:left;
        }

        .green-box {
            width:250px;
            height:100px;
            background-color: green;
            float:left;
        }

        .text-box {
            text-align: center;
            background-color: white;
            width: 100%;
            float: left;
            /* height: 30px; */
        }

        .blue-box {
            width:500px; /* 100% */
            height:200px;
            background-color: blue;
            float: left;
        }

        /* float 사용시 clear */
        .container::after {
            content: "";
            display: block;
            clear: both;
        }


    </style>
</head>
<body>
    
    <div class="container">
        <div class="red-box">
        </div><div class="green-box"></div>
        <div class="text-box">글자가운데정렬</div>
        <div class="blue-box"></div>
    </div>

</body>
