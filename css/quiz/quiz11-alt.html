<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        .container {
            width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
        }
        .header-left {
            width: 400px;
            height: 100px;
            background-color: yellow;
        }
        .header-right {
            width: 400px;
            height: 100px;
            background-color: gray;
        }

        .nav {
            width: 100%;
            height: 100px;
            background-color: purple;
        }

        .main {
            display: flex;
        }
        .main-left {
            width: 40%;
            height: 200px;
            background-color: lightblue;
        }
        .main-right {
            width: 60%;
            height: 200px;
        }
        .main-right-1 {
            height: 50%;
            background-color: yellow;
        }
        .main-right-2 {
            height: 50%;
            background-color: orange;
        }

        .footer {
            display: flex;
        }
        .footer-1 {
            width: 25%;
            height: 100px;
            background-color: yellow;
        }
        .footer-2 {
            width: 25%;
            height: 100px;
            background-color: orange;
        }
        .footer-3 {
            width: 25%;
            height: 100px;
            background-color: aquamarine;
        }
        .footer-4 {
            width: 25%;
            height: 100px;
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left"></div>
            <div class="header-right"></div>
        </div>

        <div class="nav"></div>

        <div class="main">
            <div class="main-left"></div>
            <div class="main-right">
                <div class="main-right-1"></div>
                <div class="main-right-2"></div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-1"></div>
            <div class="footer-2"></div>
            <div class="footer-3"></div>
            <div class="footer-4"></div>
        </div>
    </div>
</body>
</html>
