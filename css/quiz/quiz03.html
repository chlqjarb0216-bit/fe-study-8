<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
        }

        .box {
            width: 200px;
            height: 100px;
            border: 1px solid green;

            margin: 20px;

            display: inline-block;
        }

        .lorem {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
        }

    </style>
</head>
<body>
    <p class="title">박스 정렬</p>

    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>

    <p class="lorem">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Maxime perspiciatis impedit iure omnis itaque, ducimus laboriosam aspernatur vel ut ratione veniam corporis nam doloribus laudantium. Officia pariatur saepe laborum corrupti.</p>
</body>
</html>
