<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 
            position 속성 : 요소의 위치를 지정하는 속성(배치 방식)
                static : 요소의 기본 위치 지정 방식 (기본값)
                relative : 요소를 원래 위치에서 상대적으로 이동시킴
                absolute : 요소를 가장 가까운 위치 지정 가능 조상 요소에 대해 절대적으로 위치시킴
                            부모요소 static -> 기준점X
                            부모요소 relative -> 부모 요소 기준
                fixed : 요소를 브라우저 창에 대해 고정된 위치에 배치(절대좌표)
                sticky : 요소가 스크롤 위치에 따라 상대적과 고정된 위치 사이에서 전환됨(특정 위치에서 fixed처럼 고정)
        */

        .box {
            width: 200px;
            height: 200px;
        }

        .red-box {
            background-color: red;

            position: relative;
            left: 100px;
        }

        .green-box {
            background-color: green;
            left: 100px;
            top: 50px;
            /* 기본값 static 인 경우, 위치조정X */
            position: static;
        }

        .blue-box {
            background-color: blue;

            position: relative;
            left: -100px;
            top: -30px;
        }
    </style>
</head>
<body>
    
    <div class="box red-box"></div>
    <div class="box green-box"></div>
    <div class="box blue-box"></div>

</body>
</html>
