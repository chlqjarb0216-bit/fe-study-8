<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        .container {
            display: grid;
            grid-template-columns: 90px 90px 90px;
            grid-template-rows: 80px 80px;

            row-gap: 5px;
            column-gap: 10px;
        }

        .item {
            border: 1px solid black;
        }

        .row-merge {
            /* grid-row-start: 1;
            grid-row-end: 3; */
            grid-row: 1 / span 2;
        }

        .col-merge {
            /* grid-column-start: 2;
            grid-column-end: 4; */
            grid-column: 2 / 4;
        }
        
    </style>
</head>
<body>
    <!-- <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div> -->
    
    <div class="container">
        <div class="item row-merge"></div>
        <div class="item col-merge"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
</body>
</html>
