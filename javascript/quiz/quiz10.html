<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <style>
            .bc-gray {
                background-color: gray;
            }
            .red {
                color: red;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="main">
                <p id="p1">p1 텍스트</p>
                <p id="p2">p2 텍스트</p>
            </div>
        </div>
        <button onclick="changeMain()">main 배경색 gray로 변경</button>
        <button onclick="changeP1()">p1 글자색 red로 변경</button>
        <button onclick="changeP2()">"p2 텍스트"를 "p2 글자" 로 변경</button>
        <button onclick="undoMain()">main 배경색 white로 변경</button>
        <button onclick="undoP1()">p1 글자색 black로 변경</button>

        <script>
            /* 코드 작성 부분 */
            const main = document.getElementById("main");
            const p1 = document.getElementById("p1");
            const p2 = document.getElementById("p2");

            const textList = [
                "p2 텍스트",
                "p2 하나",
                "p2 둘",
                "p2 셋",
                "p2 넷",
            ];
            let cnt = 0;

            // function changeMain() {
            //     main.classList.add("bc-gray");
            // }
            // function changeP1() {
            //     p1.classList.add("red");
            // }
            // function changeP2() {
            //     p2.textContent = "p2 글자";
            // }

            function undoMain() {
                main.classList.remove("bc-gray");
            }
            function undoP1() {
                p1.classList.remove("red");
            }

            const changeMain = () => {
                main.classList.toggle("bc-gray");
            };
            const changeP1 = () => {
                p1.classList.toggle("red");
            };
            const changeP2 = () => {
                p2.textContent = textList[++cnt % textList.length];
            };
        </script>
    </body>
</html>
